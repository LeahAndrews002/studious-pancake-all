<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loading…</title>
  <meta name="robots" content="noindex" />
  <style>
    #boot-status {
      font: 14px/1.4 system-ui, Segoe UI, Inter, Arial, sans-serif;
      color: #444;
      padding: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <noscript>This site requires JavaScript to run.</noscript>
  <div id="boot-status">Loading application…</div>

  <script>
  (function () {
    const files = ["index.obf.js"]; 
    const prefix = ""; 

    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement("script");
        s.src = prefix + src;
        s.async = false;
        s.defer = false;
        s.onload = () => resolve(src);
        s.onerror = () => reject(new Error("Failed to load " + src));
        (document.head || document.documentElement).appendChild(s);
      });
    }

    async function start() {
      try {
        for (const f of files) {
          await loadScript(f);
        }
      } catch (err) {
        console.error(err);
        const boot = document.getElementById("boot-status");
        if (boot) boot.textContent = err.message;
        return;
      }
      const boot = document.getElementById("boot-status");
      if (boot) boot.remove();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", start);
    } else {
      start();
    }
  })();
  </script>
</body>
</html>
